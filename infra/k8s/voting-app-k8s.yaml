# ============================================================
# Redis — Deployment + Service
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP

---
# ============================================================
# PostgreSQL — Deployment + Service
# Password/user/db pulled from the Secret, not hardcoded.
# Data persisted via PVC (postgres-pvc), bound to worker1.
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP

---
# ============================================================
# Worker — consumes votes from Redis, writes to PostgreSQL
# No Service needed — nothing else calls the worker directly.
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: abdulmonaimmedhat/vote-worker:latest
          env:
            - name: REDIS_HOST
              value: redis
            - name: POSTGRES_HOST
              value: postgres
          envFrom:
            - secretRef:
                name: postgres-secret

---
# ============================================================
# Vote app — Deployment + NodePort Service (external access)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote-deployment
  labels:
    app: vote
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
        - name: vote
          image: abdulmonaimmedhat/vote-app:latest
          ports:
            - containerPort: 5000
          env:
            - name: REDIS_HOST
              value: redis

---
apiVersion: v1
kind: Service
metadata:
  name: vote-service
spec:
  selector:
    app: vote
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30000
  type: NodePort

---
# ============================================================
# Result app — Deployment + NodePort Service (external access)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: result-deployment
  labels:
    app: result
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
        - name: result
          image: abdulmonaimmedhat/vote-result:latest
          ports:
            - containerPort: 3000
          env:
            - name: POSTGRES_HOST
              value: postgres
          envFrom:
            - secretRef:
                name: postgres-secret

---
apiVersion: v1
kind: Service
metadata:
  name: result-service
spec:
  selector:
    app: result
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30001
  type: NodePort
